name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Resolve modules
        run: go mod tidy
      - name: Format source
        run: gofmt -w .
      - name: Upload generated Go files
        uses: actions/upload-artifact@v4
        with:
          name: generated-go-files
          path: |
            go.mod
            go.sum
            cmd
            internal
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Build
        run: go build ./cmd/opspilot
