name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        id: tests
        continue-on-error: true
        run: go test -race -coverprofile=coverage.out ./... >test.log 2>&1
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
      - name: Fail on test error
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Build
        run: go build ./cmd/opspilot
