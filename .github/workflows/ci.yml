name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Apply expiry rounding fix
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('internal/tools/tlsinspect/tlsinspect.go')
          text = path.read_text()
          old = 'DaysRemaining:      int64(cert.NotAfter.Sub(now).Hours() / 24),'
          new = 'DaysRemaining:      remainingDays(cert.NotAfter, now),'
          if old not in text:
              raise SystemExit('expected expiry expression not found')
          path.write_text(text.replace(old, new, 1))
          PY
          gofmt -w internal/tools/tlsinspect
      - name: Commit expiry rounding fix
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if ! git diff --quiet; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add internal/tools/tlsinspect
            git commit -m 'fix: report expired certificates with negative days'
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Build
        run: go build ./cmd/opspilot
