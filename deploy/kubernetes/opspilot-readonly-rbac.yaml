apiVersion: v1
kind: Namespace
metadata:
  name: opspilot
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opspilot
  namespace: opspilot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opspilot-readonly-diagnostics
rules:
  - nonResourceURLs:
      - /version
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opspilot-readonly-diagnostics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opspilot-readonly-diagnostics
subjects:
  - kind: ServiceAccount
    name: opspilot
    namespace: opspilot
